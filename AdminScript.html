<script>
  const adminState = {
    snapshot: null,
    token: sessionStorage.getItem('tarot_admin_token') || ''
  };

  function setAdminStatus(msg) {
    document.getElementById('admin-status').textContent = msg || '';
  }

  function esc(text) {
    return String(text || '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

  function showDashboard(isLoggedIn) {
    document.getElementById('login-card').classList.toggle('hidden', isLoggedIn);
    document.getElementById('dashboard').classList.toggle('hidden', !isLoggedIn);
  }

  function withAdminToken(payload) {
    return Object.assign({}, payload || {}, { adminToken: adminState.token });
  }

  function buildRescheduleOptions(currentSlotKey) {
    const slots = adminState.snapshot.slots || [];
    return slots
      .filter(s => s.status === 'Trống' && s.slotKey !== currentSlotKey)
      .map(s => `<option value="${esc(s.date + '|' + s.start + '|' + s.end)}">${esc(s.date)} ${esc(s.start)}-${esc(s.end)}</option>`)
      .join('');
  }

  /* ---- BOOKINGS ---- */

  function renderBookings() {
    const tbody = document.getElementById('booking-table');
    const statusFilter = document.getElementById('booking-status-filter');
    const allRows = adminState.snapshot.bookings || [];

    const currentFilter = statusFilter ? statusFilter.value : '';
    const statuses = [...new Set(allRows.map(b => b.status).filter(Boolean))];
    if (statusFilter) {
      statusFilter.innerHTML = '<option value="">-- Tất cả --</option>';
      statuses.forEach((s) => {
        const opt = document.createElement('option');
        opt.value = s;
        opt.textContent = s;
        if (currentFilter === s) opt.selected = true;
        statusFilter.appendChild(opt);
      });
    }

    const rows = currentFilter ? allRows.filter(b => b.status === currentFilter) : allRows;

    tbody.innerHTML = rows.map((b) => {
      const rescheduleOptions = buildRescheduleOptions(b.slotKey);
      const isConfirmed = b.status === adminState.snapshot.status.BOOKING_CONFIRMED;
      const isCancelled = b.status === adminState.snapshot.status.BOOKING_CANCELLED;
      const allowConfirm = b.status === adminState.snapshot.status.BOOKING_PENDING;
      const allowCancel = [
        adminState.snapshot.status.BOOKING_PENDING,
        adminState.snapshot.status.BOOKING_CONFIRMED,
        adminState.snapshot.status.BOOKING_RESCHEDULED
      ].includes(b.status);
      const allowReschedule = [
        adminState.snapshot.status.BOOKING_PENDING,
        adminState.snapshot.status.BOOKING_CONFIRMED,
        adminState.snapshot.status.BOOKING_RESCHEDULED
      ].includes(b.status);

      const confirmBtnStyle = isConfirmed ? 'background:#28a745;color:#fff;' : isCancelled ? 'background:#ccc;' : '';
      const confirmBtnText = isConfirmed ? '✓ Đã xác nhận' : isCancelled ? 'Đã huỷ' : 'Confirm';

      return `
        <tr>
          <td>${esc(b.bookingCode)}</td>
          <td>
            <strong>${esc(b.fullName)}</strong><br>
            <span class="muted">${esc(b.phone)}<br>${esc(b.email)}${b.socialName ? '<br>' + esc(b.socialName) : ''}</span>
          </td>
          <td>${esc(b.comboName)}</td>
          <td>${esc(b.date)}<br>${esc(b.start)}-${esc(b.end)}</td>
          <td>${esc(b.status)}</td>
          <td>${b.billUrl ? `<a href="${esc(b.billUrl)}" target="_blank">Xem bill</a>` : '<span class="muted">Chưa có</span>'}</td>
          <td>
            <div class="inline">
              <button class="mini" style="${confirmBtnStyle}" ${allowConfirm ? '' : 'disabled'} onclick="changeStatus('${esc(b.bookingCode)}','${esc(adminState.snapshot.status.BOOKING_CONFIRMED)}')">${confirmBtnText}</button>
              <button class="mini" ${allowCancel ? '' : 'disabled'} onclick="changeStatus('${esc(b.bookingCode)}','${esc(adminState.snapshot.status.BOOKING_CANCELLED)}')">${isCancelled ? '✗ Đã huỷ' : 'Cancel'}</button>
            </div>
            <div class="inline" style="margin-top:6px;">
              <select id="rs-${esc(b.bookingCode)}" ${allowReschedule ? '' : 'disabled'}>
                <option value="">Chọn slot mới</option>
                ${rescheduleOptions}
              </select>
              <button class="mini" ${allowReschedule ? '' : 'disabled'} onclick="rescheduleBooking('${esc(b.bookingCode)}')">${b.status === adminState.snapshot.status.BOOKING_RESCHEDULED ? '✓ Đã dời' : 'Reschedule'}</button>
            </div>
          </td>
        </tr>
      `;
    }).join('');

    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="muted">Chưa có booking.</td></tr>';
    }
  }

  /* ---- SLOTS (Calendar) ---- */

  function renderSlots() {
    const tbody = document.getElementById('slot-table');
    const dateFilter = document.getElementById('admin-date-filter');
    const allSlots = adminState.snapshot.slots || [];

    const currentDateVal = dateFilter ? dateFilter.value : '';
    const dates = [...new Set(allSlots.map(s => s.date))].sort();
    if (dateFilter) {
      dateFilter.innerHTML = '<option value="">-- Tất cả ngày --</option>';
      dates.forEach((d) => {
        const opt = document.createElement('option');
        opt.value = d;
        opt.textContent = d;
        if (currentDateVal === d) opt.selected = true;
        dateFilter.appendChild(opt);
      });
    }

    const filtered = currentDateVal ? allSlots.filter(s => s.date === currentDateVal) : allSlots;

    tbody.innerHTML = filtered.map((s) => {
      const isAvailable = s.status === 'Trống';
      const statusClass = isAvailable ? 'slot-available' : 'slot-booked';
      const displayTitle = isAvailable ? '🟢 Trống' : '🔴 ' + esc(s.title);

      return `
        <tr>
          <td>${esc(s.date)}</td>
          <td>${esc(s.start)}-${esc(s.end)}</td>
          <td class="${statusClass}">${displayTitle}</td>
          <td>
            ${isAvailable ? `<button class="mini" onclick="deleteSlot('${esc(s.eventId)}')">Xoá slot</button>` : '<span class="muted">—</span>'}
          </td>
        </tr>
      `;
    }).join('');

    if (!filtered.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="muted">Chưa có slot. Tạo event "Nhận khách" trên Google Calendar.</td></tr>';
    }
  }

  /* ---- AUTH ---- */

  function onAuthFailed(err) {
    const msg = (err && err.message) ? err.message : 'Phiên admin không hợp lệ.';
    setAdminStatus('Lỗi: ' + msg);
    if (msg.includes('Phiên admin') || msg.includes('phien admin') || msg.includes('hết hạn') || msg.includes('het han')) {
      sessionStorage.removeItem('tarot_admin_token');
      adminState.token = '';
      showDashboard(false);
    }
  }

  function loadSnapshot() {
    if (!adminState.token) return;

    setAdminStatus('Đang tải dữ liệu...');
    google.script.run
      .withSuccessHandler((snapshot) => {
        try {
          if (!snapshot) {
            setAdminStatus('Lỗi: Server trả về dữ liệu rỗng. Hãy kiểm tra Deploy đã là New version chưa.');
            return;
          }
          adminState.snapshot = snapshot;
          renderBookings();
          renderSlots();
          setAdminStatus('Đã cập nhật dữ liệu.');
        } catch (renderErr) {
          setAdminStatus('Lỗi hiển thị: ' + renderErr.message);
          console.error('Render error:', renderErr);
        }
      })
      .withFailureHandler(onAuthFailed)
      .getAdminSnapshot(withAdminToken());
  }

  function loginAdmin() {
    const pin = document.getElementById('admin-pin').value || '';
    if (pin.trim().length < 6) {
      setAdminStatus('PIN phải tối thiểu 6 ký tự.');
      return;
    }

    setAdminStatus('Đang đăng nhập...');
    google.script.run
      .withSuccessHandler((res) => {
        adminState.token = res.token;
        sessionStorage.setItem('tarot_admin_token', res.token);
        showDashboard(true);
        document.getElementById('admin-pin').value = '';
        loadSnapshot();
      })
      .withFailureHandler((err) => {
        setAdminStatus('Đăng nhập thất bại: ' + (err && err.message ? err.message : 'Lỗi không xác định.'));
      })
      .adminLogin({ pin });
  }

  function logoutAdmin() {
    google.script.run.withSuccessHandler(() => {}).adminLogout(withAdminToken());
    sessionStorage.removeItem('tarot_admin_token');
    adminState.token = '';
    adminState.snapshot = null;
    showDashboard(false);
    setAdminStatus('');
  }

  /* ---- BOOKING ACTIONS ---- */

  function changeStatus(bookingCode, newStatus) {
    const note = prompt('Ghi chú (tuỳ chọn):', '') || '';
    setAdminStatus('Đang cập nhật...');
    google.script.run
      .withSuccessHandler(() => {
        loadSnapshot();
      })
      .withFailureHandler(onAuthFailed)
      .updateBookingStatus(withAdminToken({ bookingCode, newStatus, note }));
  }

  function rescheduleBooking(bookingCode) {
    const select = document.getElementById('rs-' + bookingCode);
    const val = select ? select.value : '';
    if (!val) {
      setAdminStatus('Vui lòng chọn slot mới trước khi dời lịch.');
      return;
    }

    // val format: "date|start|end" → build slotKey
    const parts = val.split('|');
    const newSlotKey = parts.join('|');

    const note = prompt('Ghi chú dời lịch gửi email (tuỳ chọn):', '') || '';
    setAdminStatus('Đang dời lịch...');

    google.script.run
      .withSuccessHandler(() => {
        loadSnapshot();
      })
      .withFailureHandler(onAuthFailed)
      .updateBookingStatus(withAdminToken({
        bookingCode,
        newStatus: adminState.snapshot.status.BOOKING_RESCHEDULED,
        newSlotKey,
        note
      }));
  }

  /* ---- SLOT ACTIONS (Calendar) ---- */

  function deleteSlot(eventId) {
    if (!confirm('Xoá slot này khỏi Calendar?')) return;
    setAdminStatus('Đang xoá slot...');
    google.script.run
      .withSuccessHandler(() => {
        loadSnapshot();
      })
      .withFailureHandler(onAuthFailed)
      .adminDeleteSlot(withAdminToken({ eventId }));
  }

  function addSlot() {
    const date = document.getElementById('new-slot-date').value;
    const start = document.getElementById('new-slot-start').value;
    const end = document.getElementById('new-slot-end').value;

    if (!date || !start || !end) {
      setAdminStatus('Vui lòng điền đầy đủ ngày, giờ bắt đầu và kết thúc.');
      return;
    }

    setAdminStatus('Đang thêm slot...');
    google.script.run
      .withSuccessHandler(() => {
        document.getElementById('new-slot-date').value = '';
        document.getElementById('new-slot-start').value = '';
        document.getElementById('new-slot-end').value = '';
        loadSnapshot();
      })
      .withFailureHandler(onAuthFailed)
      .adminCreateSlot(withAdminToken({ date, start, end }));
  }

  /* ---- EVENT LISTENERS ---- */

  document.getElementById('login-btn').addEventListener('click', loginAdmin);
  document.getElementById('admin-pin').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') loginAdmin();
  });
  document.getElementById('refresh-btn').addEventListener('click', loadSnapshot);
  document.getElementById('logout-btn').addEventListener('click', logoutAdmin);
  document.getElementById('admin-date-filter').addEventListener('change', () => {
    if (adminState.snapshot) renderSlots();
  });
  document.getElementById('booking-status-filter').addEventListener('change', () => {
    if (adminState.snapshot) renderBookings();
  });
  document.getElementById('add-slot-btn').addEventListener('click', addSlot);

  showDashboard(Boolean(adminState.token));
  if (adminState.token) {
    loadSnapshot();
  }
</script>
