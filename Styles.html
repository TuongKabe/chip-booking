<style>
  :root {
    --bg: #f6f6ea;
    --text: #23201a;
    --card: #fffef8;
    --accent: #136f63;
    --border: #d8d1bf;
    --muted: #6a6659;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: "Segoe UI", Tahoma, sans-serif;
    color: var(--text);
    background: radial-gradient(circle at top left, #fff7d1 0%, var(--bg) 45%, #e8f4f1 100%);
  }

  .container {
    max-width: 920px;
    margin: 0 auto;
    padding: 24px 16px 48px;
  }

  .hero {
    margin-bottom: 18px;
  }

  .eyebrow {
    text-transform: uppercase;
    font-size: 12px;
    letter-spacing: 1.2px;
    color: var(--accent);
    font-weight: 700;
    margin: 0;
  }

  h1, h2 {
    margin: 8px 0 12px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-top: 14px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
  }

  .item {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    cursor: pointer;
    background: #fff;
    transition: transform .12s ease, border-color .12s ease;
  }

  .item:hover {
    transform: translateY(-2px);
    border-color: var(--accent);
  }

  .item.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(19, 111, 99, .12);
  }

  label {
    display: block;
    margin: 10px 0;
    font-weight: 600;
    font-size: 14px;
  }

  input, textarea, select, button {
    width: 100%;
    margin-top: 6px;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font: inherit;
  }

  button {
    background: var(--accent);
    color: #fff;
    border: none;
    font-weight: 700;
    cursor: pointer;
  }

  .payment-grid {
    display: grid;
    gap: 12px;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  }

  .qr {
    width: 100%;
    max-width: 280px;
    border-radius: 10px;
    border: 1px solid var(--border);
  }

  .muted {
    color: var(--muted);
    font-size: 13px;
  }

  .hidden { display: none; }

  @media (max-width: 640px) {
    .container { padding: 14px 10px 30px; }
    .card { padding: 12px; }
  }
</style>
